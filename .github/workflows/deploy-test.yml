name: Deploy IRC Hispano (Test)
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install --production
      - name: Start server
        run: PORT=3000 RENDER=true node server.js &
      - name: Wait ready
        run: sleep 5 && curl -sf http://localhost:3000 && echo "OK"
      - name: Tunnel and publish URL
        run: |
          npm install -g localtunnel
          lt --port 3000 > /tmp/lt.log 2>&1 &
          sleep 12
          URL=$(grep -oP 'https://[^\s]+\.loca\.lt' /tmp/lt.log | head -1)
          echo "PUBLIC_URL=$URL" >> $GITHUB_ENV
          echo "======== URL PUBLICA: $URL ========"
          SHA=$(git rev-parse HEAD)
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" \
            --data "{\"state\":\"success\",\"target_url\":\"$URL\",\"description\":\"$URL\",\"context\":\"deployment/live-url\"}"
      - name: Keep alive 2h
        run: sleep 7200
