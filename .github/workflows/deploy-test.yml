name: Deploy IRC Hispano (Test)
on:
  workflow_dispatch:
permissions:
  contents: write
  statuses: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --production

      - name: Full IRC connection diagnostic
        run: |
          node - << 'NODEEOF'
          const { WebSocket } = require('ws');
          const crypto = require('crypto');

          const KIWI_HOST   = 'kiwi.chathispano.com';
          const KIWI_SERVER = `https://${KIWI_HOST}:9000/webirc/kiwiirc/`;
          const ports = [9000, 9001, 9002, 9004];

          async function testPort(port) {
            return new Promise((resolve) => {
              const srv     = String(Math.floor(Math.random()*900)+100);
              const session = crypto.randomBytes(8).toString('hex');
              const url     = `wss://${KIWI_HOST}:${port}/webirc/kiwiirc/${srv}/${session}/websocket`;
              console.log(`\n=== Puerto ${port} ===`);
              console.log('URL:', url);

              const ws = new WebSocket(url, {
                headers: {
                  'Origin': 'https://chathispano.com',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36'
                },
                rejectUnauthorized: false
              });

              const t = setTimeout(() => {
                console.log(`[${port}] TIMEOUT 25s`);
                ws.terminate();
                resolve('timeout');
              }, 25000);

              let registrationTimer = null;

              ws.on('open', () => console.log(`[${port}] WS OPEN`));

              ws.on('message', (data) => {
                const frame = data.toString();
                console.log(`[${port}] FRAME: ${frame.slice(0, 500)}`);

                if (frame === 'o') {
                  // Test 1: con CONTROL START (URL completa)
                  const ctrl = JSON.stringify([`:${KIWI_SERVER} CONTROL START`]);
                  console.log(`[${port}] Enviando CONTROL START:`, ctrl);
                  ws.send(ctrl);

                  setTimeout(() => {
                    const nick = 'DiagBot' + Math.floor(Math.random()*1000);
                    console.log(`[${port}] Enviando NICK ${nick} + USER`);
                    ws.send(JSON.stringify([`NICK ${nick}\r\n`]));
                    ws.send(JSON.stringify(['USER kiwi 0 * :DiagBot ChatHispano\r\n']));

                    // Si no hay respuesta en 15s = problema
                    registrationTimer = setTimeout(() => {
                      console.log(`[${port}] SIN RESPUESTA de IRC en 15s tras NICK/USER`);
                      ws.terminate();
                      resolve('no_irc_response');
                    }, 15000);
                  }, 300);
                }

                if (frame.startsWith('a')) {
                  // Recibimos datos IRC
                  try {
                    const msgs = JSON.parse(frame.slice(1));
                    for (const msg of msgs) {
                      console.log(`[${port}] IRC DATA:`, msg.replace(/\r\n/g, '\\r\\n'));
                      if (msg.includes('001')) {
                        clearTimeout(registrationTimer);
                        clearTimeout(t);
                        console.log(`[${port}] *** CONECTADO A IRC (001 RPL_WELCOME) ***`);
                        ws.terminate();
                        resolve('connected');
                      }
                    }
                  } catch(e) { console.log(`[${port}] Parse error:`, e.message); }
                }

                if (frame.startsWith('c')) {
                  clearTimeout(registrationTimer);
                  console.log(`[${port}] SockJS CLOSE:`, frame);
                  clearTimeout(t);
                  resolve('sockjs_close');
                }
              });

              ws.on('error', (e) => {
                clearTimeout(t);
                clearTimeout(registrationTimer);
                console.log(`[${port}] WS ERROR:`, e.message);
                resolve('error');
              });

              ws.on('close', (code) => console.log(`[${port}] WS CLOSE code:`, code));
            });
          }

          (async () => {
            for (const p of ports) {
              const result = await testPort(p);
              console.log(`Puerto ${p}: resultado = ${result}`);
              if (result === 'connected') {
                console.log('\n✓ CONEXION IRC EXITOSA');
                break;
              }
            }
          })();
          NODEEOF

      - name: Start IRC Hispano server
        run: PORT=3000 RENDER=true node server.js &

      - name: Wait for server ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Server ready!" && break
            echo "Waiting ($i/15)..."
            sleep 2
          done

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Start tunnel and write URL to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cloudflared tunnel --url http://localhost:3000 --no-autoupdate > /tmp/cf.log 2>&1 &

          echo "Waiting for Cloudflare URL..."
          URL=""
          for i in $(seq 1 40); do
            URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
            [ -n "$URL" ] && break
            sleep 3
          done

          if [ -z "$URL" ]; then
            cat /tmp/cf.log
            exit 1
          fi

          echo "URL: $URL"

          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "$URL" > LIVE_URL.txt
          git add LIVE_URL.txt
          git commit -m "ci: URL activa del servidor = $URL"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" main

          echo "========================================"
          echo "  SERVIDOR ACTIVO EN: $URL"
          echo "========================================"

      - name: Keep alive (2h)
        run: |
          echo "Servidor corriendo. Se detendra en 2 horas."
          sleep 7200
